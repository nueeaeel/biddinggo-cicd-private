apiVersion: apps/v1
kind: Deployment
metadata:
  name: biddinggo-api-deploy
  namespace: biddinggo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: biddinggo-api
  template:
    metadata:
      labels:
        app: biddinggo-api
    spec:
      containers:
      - name: biddinggo-api
        image: ghcr.io/nueeaeel/biddinggo-service:43
        envFrom:
        - secretRef:
            name: biddinggo-env-secret
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "local"
        - name: DB_HOST
          value: "mariadb-service"
        - name: REDIS_HOST
          value: "redis-service"
        - name: FRONTEND_URL
          value: "https://api.bidding-go.com:*,http://localhost:*,http://127.0.0.1:*"
        - name: FRONTEND_REDIRECT_URI
          value: "http://localhost:5173/auth/callback"
        - name: BACKEND_GOOGLE_REDIRECT_URI
          value: "https://api.bidding-go.com:30443/login/oauth2/code/google"
        - name: BACKEND_KAKAO_REDIRECT_URI
          value: "https://api.bidding-go.com:30443/login/oauth2/code/kakao"
        - name: OPENAPI_SERVER_URL
          value: "https://api.bidding-go.com"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
