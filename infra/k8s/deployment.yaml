apiVersion: apps/v1
kind: Deployment
metadata:
  name: biddinggo-api-deploy
  namespace: biddinggo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biddinggo-api
  template:
    metadata:
      labels:
        app: biddinggo-api
    spec:
      containers:
      - name: biddinggo-api
        image: ghcr.io/nueeaeel/biddinggo-service:21
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "local"
        - name: LOCAL_PORT
          value: "8080"
        - name: DB_HOST
          value: "mariadb-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "biddinggo"
        - name: DB_USERNAME
          value: "biddinggo"
        - name: DB_PASSWORD
          value: "biddinggo"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_USERNAME
          value: ""
        - name: REDIS_PASSWORD
          value: ""
        - name: KAKAO_REST_API_KEY
          value: "test"
        - name: KAKAO_CLIENT_SECRET
          value: "test"
        - name: GOOGLE_CLIENT_ID
          value: "test"
        - name: GOOGLE_CLIENT_SECRET
          value: "test"
        - name: TOSS_SECRET_KEY
          value: "test"
        - name: R2_ACCESS_KEY
          value: "test"
        - name: R2_SECRET_KEY
          value: "test"
        - name: R2_ACCOUNT_ID
          value: "test"
        - name: R2_BUCKET
          value: "test"
        - name: R2_PUBLIC_BASE_URL
          value: "https://example.com"
        - name: JWT_SECRET_KEY
          value: "test-jwt-secret-key-for-github-actions"
        - name: FRONTEND_URL
          value: "https://api.bidding-go.com:*,http://localhost:*,http://127.0.0.1:*"
        - name: FRONTEND_REDIRECT_URI
          value: "http://localhost:5173/auth/callback"
        - name: OPENAI_API_KEY
          value: "test"
        - name: SUPABASE_URL
          value: "https://example.supabase.co"
        - name: SUPABASE_SERVICE_ROLE_KEY
          value: "test"
        - name: OPENAPI_SERVER_URL
          value: "https://api.bidding-go.com"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
