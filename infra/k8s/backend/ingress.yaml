apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biddinggo-api-ingress
  namespace: biddinggo
spec:
  ingressClassName: nginx
  rules:
  - host: api.bidding-go.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: biddinggo-api-service
            port:
              number: 8080
