apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biddinggo-api-ingress
  namespace: biddinggo
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
spec:
  ingressClassName: nginx
  tls:
  - secretName: biddinggo-api-tls-secret
    hosts:
    - api.bidding-go.com
  rules:
  - host: api.bidding-go.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: biddinggo-api-service
            port:
              number: 8080
