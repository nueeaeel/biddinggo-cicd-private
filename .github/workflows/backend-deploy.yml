name: Backend Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/beyond-sw-camp/be25-2nd-biddingmate-biddinggo/biddinggo-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.8.5
        env:
          MARIADB_ROOT_PASSWORD: biddinggo
          MARIADB_DATABASE: biddinggo
          MARIADB_USER: biddinggo
          MARIADB_PASSWORD: biddinggo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -pbiddinggo --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: local
          LOCAL_PORT: 8080
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: biddinggo
          DB_USERNAME: biddinggo
          DB_PASSWORD: biddinggo
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_USERNAME: ""
          REDIS_PASSWORD: ""
          KAKAO_REST_API_KEY: test
          KAKAO_CLIENT_SECRET: test
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          TOSS_SECRET_KEY: test
          R2_ACCESS_KEY: test
          R2_SECRET_KEY: test
          R2_ACCOUNT_ID: test
          R2_BUCKET: test
          R2_PUBLIC_BASE_URL: https://example.com
          JWT_SECRET_KEY: test-jwt-secret-key-for-github-actions
          FRONTEND_REDIRECT_URI: http://localhost:5173/auth/callback
          OPENAI_API_KEY: test
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test
        run: ./gradlew test --no-daemon

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p 22 "$SSH_USER@$SSH_HOST" \
            "GHCR_USERNAME='$GHCR_USERNAME' GHCR_PAT='$GHCR_PAT' bash -s" <<'EOF'
          set -euo pipefail

          cd /home/cloud/bidding-go

          echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          docker compose pull
          docker compose up -d
          docker image prune -f
          EOF